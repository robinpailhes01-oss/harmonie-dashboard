<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Harmonie Yacht — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAFAF8;--surface:#FFF;--border:#EFEEEA;--text:#1A1A1A;--text-secondary:#7A7A72;--text-muted:#B0AFA8;--navy:#0C2340;--navy-light:rgba(12,35,64,.06);--gold:#C9A96E;--gold-light:rgba(201,169,110,.12);--green:#22C55E;--green-bg:rgba(34,197,94,.08);--red:#EF4444;--red-bg:rgba(239,68,68,.08);--blue:#3B82F6;--blue-bg:rgba(59,130,246,.08);--serif:'Cormorant Garamond',Georgia,serif;--sans:'Plus Jakarta Sans',-apple-system,sans-serif;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.03),0 0 0 1px rgba(0,0,0,.02);--shadow-hover:0 4px 12px rgba(0,0,0,.06);--transition:.25s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}::selection{background:var(--gold-light);color:var(--navy)}::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:28px 0;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;transition:transform .3s ease}
.main{margin-left:220px;flex:1;padding:32px 40px;min-height:100vh}

/* Logo */
.logo{padding:0 24px 32px;display:flex;align-items:center;justify-content:space-between}
.logo h1{font-family:var(--serif);font-weight:400;font-size:20px;color:var(--navy)}
.logo span{font-size:11px;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase}
.close-sidebar{display:none;background:none;border:none;font-size:24px;color:var(--text-muted);cursor:pointer;padding:4px}

/* Nav */
.nav{flex:1}.nav a{display:flex;align-items:center;gap:10px;padding:10px 24px;font-size:13px;font-weight:400;color:var(--text-secondary);text-decoration:none;transition:all var(--transition);border-left:3px solid transparent;cursor:pointer}
.nav a:hover{color:var(--navy);background:var(--navy-light)}.nav a.active{color:var(--navy);background:var(--navy-light);border-left-color:var(--gold);font-weight:500}
.nav a svg{width:18px;height:18px;opacity:.5}.nav a.active svg{opacity:1}

/* Sidebar footer */
.sidebar-footer{padding:20px 24px;border-top:1px solid var(--border)}.user{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500}
.name{font-size:13px;font-weight:500}.role{font-size:11px;color:var(--text-muted)}

/* Mobile hamburger */
.hamburger{display:none;position:fixed;top:16px;left:16px;z-index:90;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;box-shadow:var(--shadow)}
.hamburger svg{width:20px;height:20px;color:var(--navy)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}

/* Page header */
.page-header{margin-bottom:32px}.page-title{font-family:var(--serif);font-size:32px;font-weight:400;color:var(--navy)}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px}

/* KPI Grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi{background:var(--surface);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);transition:box-shadow var(--transition)}
.kpi:hover{box-shadow:var(--shadow-hover)}
.kpi .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px}
.kpi .value{font-family:var(--serif);font-size:32px;font-weight:300;color:var(--navy);line-height:1}
.kpi .sub{font-size:12px;color:var(--text-muted);margin-top:4px}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:24px}
.card h3{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--navy);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}

/* Tables */
table{width:100%;border-collapse:collapse}th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);padding:10px 12px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--navy-light)}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-hot{background:rgba(239,68,68,.1);color:#DC2626}.badge-warm{background:rgba(245,158,11,.1);color:#D97706}.badge-cold{background:rgba(59,130,246,.1);color:#2563EB}
.badge-green{background:var(--green-bg);color:var(--green)}.badge-red{background:var(--red-bg);color:var(--red)}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);cursor:pointer;transition:all var(--transition)}
.filter-btn.active,.filter-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.search-input{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--sans);outline:none;width:200px;transition:border var(--transition)}
.search-input:focus{border-color:var(--gold)}

/* Finance boxes */
.finance-summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:28px}
.finance-box{background:var(--surface);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);text-align:center}
.finance-box .val{font-family:var(--serif);font-size:38px;font-weight:300;line-height:1}
.finance-box .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-top:6px}

/* Category bars */
.cat-bar{margin-bottom:10px}.cat-bar-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.cat-bar-header .cat-name{color:var(--text);font-weight:500;text-transform:capitalize}.cat-bar-header .cat-amount{color:var(--text-secondary)}
.cat-bar-track{height:8px;background:var(--border);border-radius:4px;overflow:hidden}.cat-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}

/* Delete btn */
.btn-delete{background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px 8px;border-radius:6px;font-size:16px;transition:all var(--transition)}
.btn-delete:hover{background:var(--red-bg);color:var(--red)}

/* Detail panel */
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:200}
.detail-panel{position:fixed;top:0;right:-400px;width:380px;height:100vh;background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,.08);z-index:201;transition:right .3s ease;overflow-y:auto;padding:28px}
.detail-panel.open{right:0}.detail-panel h2{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--navy);margin-bottom:20px}
.detail-field{margin-bottom:14px}.detail-field .dl{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:3px}
.detail-field .dv{font-size:14px;color:var(--text)}
.btn-ig{display:inline-block;margin-top:8px;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;color:var(--gold);border:1px solid var(--gold-light);background:rgba(201,169,110,.04);text-decoration:none;transition:all var(--transition)}.btn-ig:hover{background:var(--gold-light)}

/* Overview grid */
.overview-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}.overview-card.full{grid-column:1/-1}

/* Agents */
.agent-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}.agent-row:last-child{border:none}
.agent-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.agent-name{font-size:14px;font-weight:500;flex:1}.agent-role{font-size:12px;color:var(--text-muted)}

/* Activity */
.activity-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}.activity-item:last-child{border:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.activity-text{font-size:13px;flex:1}.activity-time{font-size:11px;color:var(--text-muted)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;z-index:999;transition:transform .3s ease;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeUp .4s ease both}

/* Empty state */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px}

/* Confirm modal */
.confirm-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.35);align-items:center;justify-content:center}
.confirm-modal.show{display:flex}
.confirm-box{background:var(--surface);border-radius:var(--radius);padding:28px;max-width:360px;width:90%;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.confirm-box h3{font-family:var(--serif);font-size:20px;margin-bottom:8px;color:var(--navy)}
.confirm-box p{font-size:13px;color:var(--text-secondary);margin-bottom:20px}
.confirm-actions{display:flex;gap:10px;justify-content:flex-end}
.confirm-actions button{padding:8px 18px;border-radius:8px;font-size:13px;font-family:var(--sans);cursor:pointer;border:1px solid var(--border);transition:all var(--transition)}
.btn-cancel{background:var(--surface);color:var(--text-secondary)}.btn-cancel:hover{background:var(--border)}
.btn-confirm-delete{background:var(--red);color:#fff;border-color:var(--red)}.btn-confirm-delete:hover{background:#DC2626}

/* ===== RESPONSIVE MOBILE ===== */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .hamburger{display:flex;align-items:center;justify-content:center}
  .close-sidebar{display:block}
  .overlay.show{display:block}
  .main{margin-left:0;padding:16px;padding-top:64px}
  .page-title{font-size:24px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
  .kpi{padding:14px 16px}.kpi .value{font-size:24px}.kpi .label{font-size:10px}
  .finance-summary{grid-template-columns:1fr}
  .finance-box .val{font-size:30px}
  .overview-grid{grid-template-columns:1fr}
  .filters{flex-direction:column;align-items:stretch}.search-input{width:100%}
  .detail-panel{width:100%}
  table{font-size:12px}th,td{padding:8px 6px}
  .hide-mobile{display:none!important}
}
@media(max-width:400px){
  .kpi-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- Mobile hamburger -->
<button class="hamburger" onclick="toggleSidebar()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="logo">
    <div><h1>Harmonie Yacht</h1><span>Dashboard</span></div>
    <button class="close-sidebar" onclick="toggleSidebar()">✕</button>
  </div>
  <nav class="nav">
    <a onclick="go('overview')" data-page="overview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Vue d'ensemble</a>
    <a onclick="go('leads')" data-page="leads"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Leads & CRM</a>
    <a onclick="go('finances')" data-page="finances"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Finances</a>
  </nav>
  <div class="sidebar-footer"><div class="user"><div class="avatar">R</div><div><div class="name">Robin</div><div class="role">Capitaine</div></div></div></div>
</aside>

<main class="main" id="mc"></main>
</div>

<!-- Detail panel -->
<div class="detail-overlay" id="dO" onclick="closeDetail()"></div>
<div class="detail-panel" id="dP"></div>

<!-- Confirm modal -->
<div class="confirm-modal" id="confirmModal">
  <div class="confirm-box">
    <h3>Supprimer cette transaction ?</h3>
    <p id="confirmText">Cette action est irréversible.</p>
    <div class="confirm-actions">
      <button class="btn-cancel" onclick="closeConfirm()">Annuler</button>
      <button class="btn-confirm-delete" onclick="confirmDelete()">Supprimer</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SU='https://utyfpmjhtfoxsxncfoxe.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV0eWZwbWpodGZveHN4bmNmb3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzgzMTUsImV4cCI6MjA4OTYxNDMxNX0.OGLR8d0GOZVMM48WlhUYrGsnthaaNNxBGPUHpJoSong';
let leads=[],revs=[],deps=[],page='overview',fTemp='all',fStat='all',search='',deleteTarget=null;

// API helpers
const hdr={apikey:SK,Authorization:`Bearer ${SK}`};
async function api(path){const r=await fetch(`${SU}/rest/v1/${path}`,{headers:hdr});return r.json()}
async function apiDel(table,id){
  const r=await fetch(`${SU}/rest/v1/${table}?id=eq.${id}`,{method:'DELETE',headers:{apikey:SK,Authorization:`Bearer ${SK}`,'Prefer':'return=minimal'}});
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t}`)}
  return r;
}

// Load data
async function load(){
  [leads,revs,deps]=await Promise.all([
    api('leads?select=*&order=derniere_interaction.desc'),
    api('revenus?select=*&order=date.desc'),
    api('depenses?select=*&order=date.desc')
  ]);
  render();
}

// Formatting
function fM(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n)}
function fDate(d){if(!d)return '—';const dt=new Date(d);return dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
function timeAgo(d){if(!d)return '';const ms=Date.now()-new Date(d);const h=ms/36e5;if(h<1)return `${Math.round(h*60)}min`;if(h<24)return `${Math.round(h)}h`;return `${Math.round(h/24)}j`}
function tempBadge(t){const m={chaud:'badge-hot',tiede:'badge-warm',froid:'badge-cold'};const l={chaud:'🔥 Chaud',tiede:'🌤 Tiède',froid:'❄️ Froid'};return `<span class="badge ${m[t]||'badge-cold'}">${l[t]||t}</span>`}
function formatInteret(t){const m={nuit_classique:'🛏 Classique',nuit_prestige:'✨ Prestige',sortie_mer_2h:'⛵ 2h',sortie_mer_3h:'⛵ 3h',sortie_mer_4h:'⛵ 4h',indetermine:'❓'};return m[t]||'—'}

// Navigation
function go(p){page=p;if(window.innerWidth<769)toggleSidebar();render()}
function toggleSidebar(){
  const s=document.getElementById('sidebar'),o=document.getElementById('overlay');
  s.classList.toggle('open');o.classList.toggle('show');
}

// Toast
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

// Delete flow
function askDelete(table,id,desc){
  deleteTarget={table,id};
  document.getElementById('confirmText').textContent=`Supprimer "${desc}" ?`;
  document.getElementById('confirmModal').classList.add('show');
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('show');deleteTarget=null}
async function confirmDelete(){
  if(!deleteTarget)return;
  const target={...deleteTarget};
  closeConfirm();
  try{
    await apiDel(target.table,target.id);
    toast('✅ Transaction supprimée');
    await load();
  }catch(e){toast('❌ Erreur : '+e.message)}
}

// Detail panel
function showDetail(l){
  const p=document.getElementById('dP'),o=document.getElementById('dO');
  p.innerHTML=`
    <button onclick="closeDetail()" style="float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted)">✕</button>
    <h2>@${l.instagram_username}</h2>
    <div class="detail-field"><div class="dl">Prénom</div><div class="dv">${l.prenom||'—'}</div></div>
    <div class="detail-field"><div class="dl">Température</div><div class="dv">${tempBadge(l.temperature)}</div></div>
    <div class="detail-field"><div class="dl">Type d'intérêt</div><div class="dv">${formatInteret(l.type_interet)}</div></div>
    <div class="detail-field"><div class="dl">Date souhaitée</div><div class="dv">${l.date_souhaitee||'—'}</div></div>
    <div class="detail-field"><div class="dl">Occasion</div><div class="dv">${l.occasion||'—'}</div></div>
    <div class="detail-field"><div class="dl">Nb personnes</div><div class="dv">${l.nombre_personnes||'—'}</div></div>
    <div class="detail-field"><div class="dl">Email</div><div class="dv">${l.email||'—'}</div></div>
    <div class="detail-field"><div class="dl">Téléphone</div><div class="dv">${l.telephone||'—'}</div></div>
    <div class="detail-field"><div class="dl">Messages</div><div class="dv">${l.nombre_messages}</div></div>
    <div class="detail-field"><div class="dl">Dernière interaction</div><div class="dv">${timeAgo(l.derniere_interaction)} (${fDate(l.derniere_interaction)})</div></div>
    <div class="detail-field"><div class="dl">Notes IA</div><div class="dv" style="font-size:13px;line-height:1.5">${l.notes||'Aucune note'}</div></div>
    <a class="btn-ig" href="https://instagram.com/${l.instagram_username}" target="_blank">Ouvrir le profil Instagram →</a>
  `;
  p.classList.add('open');o.style.display='block';
}
function closeDetail(){document.getElementById('dP').classList.remove('open');document.getElementById('dO').style.display='none'}

// ===== RENDER =====
function render(){
  document.querySelectorAll('.nav a').forEach(a=>{a.classList.toggle('active',a.dataset.page===page)});
  const mc=document.getElementById('mc');
  if(page==='overview')renderOverview(mc);
  else if(page==='leads')renderLeads(mc);
  else if(page==='finances')renderFinances(mc);
}

// ===== OVERVIEW =====
function renderOverview(mc){
  const totalR=revs.reduce((s,r)=>s+parseFloat(r.montant),0);
  const totalD=deps.reduce((s,d)=>s+parseFloat(d.montant),0);
  const profit=totalR-totalD;
  const chauds=leads.filter(l=>l.temperature==='chaud').length;
  const tiedes=leads.filter(l=>l.temperature==='tiede').length;

  mc.innerHTML=`
    <div class="page-header"><div class="page-title">Vue d'ensemble</div><div class="page-subtitle">Harmonie Yacht — Tableau de bord</div></div>
    <div class="kpi-grid">
      <div class="kpi fade-in"><div class="label">Leads total</div><div class="value">${leads.length}</div><div class="sub">🔥 ${chauds} chauds · 🌤 ${tiedes} tièdes</div></div>
      <div class="kpi fade-in" style="animation-delay:.1s"><div class="label">Revenus</div><div class="value" style="color:var(--green)">${fM(totalR)}</div><div class="sub">${revs.length} transactions</div></div>
      <div class="kpi fade-in" style="animation-delay:.2s"><div class="label">Dépenses</div><div class="value" style="color:var(--red)">${fM(totalD)}</div><div class="sub">${deps.length} transactions</div></div>
      <div class="kpi fade-in" style="animation-delay:.3s"><div class="label">Résultat net</div><div class="value" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'+':''}${fM(profit)}</div></div>
    </div>
    <div class="overview-grid">
      <div class="card"><h3>🔥 Leads récents</h3>
        ${leads.slice(0,5).map(l=>`
          <div class="activity-item" style="cursor:pointer" onclick='showDetail(${JSON.stringify(l).replace(/'/g,"\\'")})'>
            <div class="activity-dot" style="background:${l.temperature==='chaud'?'var(--red)':l.temperature==='tiede'?'#F59E0B':'var(--blue)'}"></div>
            <div class="activity-text"><strong>${l.prenom||l.instagram_username}</strong> — ${l.type_interet?formatInteret(l.type_interet):'Nouveau'}</div>
            <div class="activity-time">${timeAgo(l.derniere_interaction)}</div>
          </div>
        `).join('')}
      </div>
      <div class="card"><h3>🤖 Agents IA</h3>
        <div class="agent-row"><div class="agent-dot" style="background:var(--green)"></div><div class="agent-name">Léa</div><div class="agent-role">Ventes Instagram — Active</div></div>
        <div class="agent-row"><div class="agent-dot" style="background:var(--green)"></div><div class="agent-name">Analyste Financier</div><div class="agent-role">Bot Telegram — Actif</div></div>
        <div class="agent-row"><div class="agent-dot" style="background:var(--green)"></div><div class="agent-name">Rapport Hebdo</div><div class="agent-role">Lundi 8h — Actif</div></div>
        <div class="agent-row"><div class="agent-dot" style="background:var(--text-muted)"></div><div class="agent-name">Directeur</div><div class="agent-role">Prévu — Phase 2</div></div>
      </div>
      <div class="card full"><h3>💰 Dernières transactions</h3>
        <table>
          <tr><th>Date</th><th>Type</th><th>Description</th><th>Montant</th></tr>
          ${[...revs.map(r=>({...r,_type:'revenu'})),...deps.map(d=>({...d,_type:'depense'}))].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5).map(t=>`
            <tr>
              <td>${fDate(t.date)}</td>
              <td><span class="badge ${t._type==='revenu'?'badge-green':'badge-red'}">${t._type==='revenu'?'📈 Revenu':'📉 Dépense'}</span></td>
              <td>${t.description||t.categorie||'—'}</td>
              <td style="font-weight:500;color:${t._type==='revenu'?'var(--green)':'var(--red)'}">${t._type==='revenu'?'+':'−'}${fM(t.montant)}</td>
            </tr>
          `).join('')}
          ${(revs.length+deps.length)===0?'<tr><td colspan="4" class="empty-state">Aucune transaction</td></tr>':''}
        </table>
      </div>
    </div>
  `;
}

// ===== LEADS =====
function renderLeads(mc){
  const filtered=leads.filter(l=>{
    if(fTemp!=='all'&&l.temperature!==fTemp)return false;
    if(fStat!=='all'&&l.statut!==fStat)return false;
    if(search){const s=search.toLowerCase();return (l.instagram_username||'').toLowerCase().includes(s)||(l.prenom||'').toLowerCase().includes(s)||(l.occasion||'').toLowerCase().includes(s)}
    return true;
  });

  mc.innerHTML=`
    <div class="page-header"><div class="page-title">Leads & CRM</div><div class="page-subtitle">${leads.length} leads · ${leads.filter(l=>l.temperature==='chaud').length} chauds</div></div>
    <div class="filters">
      <button class="filter-btn ${fTemp==='all'?'active':''}" onclick="fTemp='all';render()">Tous</button>
      <button class="filter-btn ${fTemp==='chaud'?'active':''}" onclick="fTemp='chaud';render()">🔥 Chauds</button>
      <button class="filter-btn ${fTemp==='tiede'?'active':''}" onclick="fTemp='tiede';render()">🌤 Tièdes</button>
      <button class="filter-btn ${fTemp==='froid'?'active':''}" onclick="fTemp='froid';render()">❄️ Froids</button>
      <input class="search-input" placeholder="Rechercher..." value="${search}" oninput="search=this.value;render()">
    </div>
    <div class="card" style="overflow-x:auto">
      <table>
        <tr><th>Lead</th><th>Température</th><th>Intérêt</th><th>Date souhaitée</th><th class="hide-mobile">Occasion</th><th class="hide-mobile">Msgs</th><th>Dernière activité</th></tr>
        ${filtered.length===0?'<tr><td colspan="7" class="empty-state">Aucun lead trouvé</td></tr>':
          filtered.map(l=>`
            <tr style="cursor:pointer" onclick='showDetail(${JSON.stringify(l).replace(/'/g,"\\'")})'>
              <td><strong>@${l.instagram_username}</strong><br><span style="font-size:11px;color:var(--text-muted)">${l.prenom||''}</span></td>
              <td>${tempBadge(l.temperature)}</td>
              <td>${formatInteret(l.type_interet)}</td>
              <td style="font-size:12px">${l.date_souhaitee||'—'}</td>
              <td class="hide-mobile" style="font-size:12px;color:var(--text-secondary)">${l.occasion||'—'}</td>
              <td class="hide-mobile"><span style="color:var(--text-muted)">${l.nombre_messages}</span></td>
              <td style="font-size:12px;color:var(--text-muted)">${timeAgo(l.derniere_interaction)}</td>
            </tr>
          `).join('')
        }
      </table>
    </div>
  `;
}

// ===== FINANCES =====
function renderFinances(mc){
  const totalR=revs.reduce((s,r)=>s+parseFloat(r.montant),0);
  const totalD=deps.reduce((s,d)=>s+parseFloat(d.montant),0);
  const profit=totalR-totalD;

  // Category breakdown for depenses
  const catMap={};
  deps.forEach(d=>{
    const cat=d.categorie||'autre';
    catMap[cat]=(catMap[cat]||0)+parseFloat(d.montant);
  });
  const cats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=cats.length>0?cats[0][1]:1;
  const catColors=['#0C2340','#C9A96E','#3B82F6','#22C55E','#F59E0B','#EF4444','#8B5CF6','#EC4899'];

  // All transactions
  const allTx=[
    ...revs.map(r=>({...r,_type:'revenu',_table:'revenus'})),
    ...deps.map(d=>({...d,_type:'depense',_table:'depenses'}))
  ].sort((a,b)=>new Date(b.date)-new Date(a.date));

  mc.innerHTML=`
    <div class="page-header"><div class="page-title">Finances</div><div class="page-subtitle">Revenus, dépenses & trésorerie</div></div>
    <div class="finance-summary">
      <div class="finance-box fade-in"><div class="val" style="color:var(--green)">${fM(totalR)}</div><div class="label">Revenus</div></div>
      <div class="finance-box fade-in" style="animation-delay:.1s"><div class="val" style="color:var(--red)">${fM(totalD)}</div><div class="label">Dépenses</div></div>
      <div class="finance-box fade-in" style="animation-delay:.2s"><div class="val" style="color:${profit>=0?'var(--green)':'var(--red)'}">${profit>=0?'+':''}${fM(profit)}</div><div class="label">Résultat net</div></div>
    </div>
    ${cats.length>0?`
    <div class="card">
      <h3>📊 Dépenses par catégorie</h3>
      ${cats.map((c,i)=>`
        <div class="cat-bar">
          <div class="cat-bar-header"><span class="cat-name">${c[0]}</span><span class="cat-amount">${fM(c[1])} (${Math.round(c[1]/totalD*100)}%)</span></div>
          <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${(c[1]/maxCat*100)}%;background:${catColors[i%catColors.length]}"></div></div>
        </div>
      `).join('')}
    </div>`:''}
    <div class="card" style="overflow-x:auto">
      <h3>📋 Toutes les transactions</h3>
      <table>
        <tr><th>Date</th><th>Type</th><th>Description</th><th class="hide-mobile">Catégorie</th><th>Montant</th><th style="width:50px"></th></tr>
        ${allTx.length===0?'<tr><td colspan="6" class="empty-state">Aucune transaction enregistrée</td></tr>':
          allTx.map(t=>`
            <tr>
              <td>${fDate(t.date)}</td>
              <td><span class="badge ${t._type==='revenu'?'badge-green':'badge-red'}">${t._type==='revenu'?'Revenu':'Dépense'}</span></td>
              <td>${t.description||'—'}</td>
              <td class="hide-mobile" style="font-size:12px;color:var(--text-secondary);text-transform:capitalize">${t.categorie||t.formule||'—'}</td>
              <td style="font-weight:500;color:${t._type==='revenu'?'var(--green)':'var(--red)'}">${t._type==='revenu'?'+':'−'}${fM(t.montant)}</td>
              <td><button class="btn-delete" onclick="event.stopPropagation();askDelete('${t._table}','${t.id}','${(t.description||t.categorie||'transaction').replace(/'/g,'')}')" title="Supprimer">🗑</button></td>
            </tr>
          `).join('')
        }
      </table>
    </div>
  `;
}

// Init
load();
setInterval(load,30000);
</script>
</body>
</html>
